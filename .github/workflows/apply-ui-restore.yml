name: Apply CPCV 0.8.8-quality UI restoration

on:
  pull_request:
    branches:
      - master
    paths:
      - ".ui-restore/**"
      - ".github/workflows/apply-ui-restore.yml"

permissions:
  contents: write

concurrency:
  group: cpcv-v0810-ui-restore
  cancel-in-progress: false

jobs:
  apply:
    name: Apply, validate, and finalize visual restoration
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: |
          npm install --global npm@11.18.0
          npm ci
      - name: Reassemble and verify signed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .ui-restore/patch-* > /tmp/cpcv-ui-restore.patch.gz.b64
          test "$(sha256sum /tmp/cpcv-ui-restore.patch.gz.b64 | cut -d' ' -f1)" = "4e79f4fc56605169c241f821a10dcdd279bf95ea31ff33bf204ab72806b552c3"
          base64 --decode /tmp/cpcv-ui-restore.patch.gz.b64 > /tmp/cpcv-ui-restore.patch.gz
          gunzip --stdout /tmp/cpcv-ui-restore.patch.gz > /tmp/cpcv-ui-restore.patch
          test "$(sha256sum /tmp/cpcv-ui-restore.patch | cut -d' ' -f1)" = "534f8aaa840a60f04e6b6a30704e963ee0c97f78e62ce51181ffba1198985143"
          git apply --check /tmp/cpcv-ui-restore.patch
          git apply /tmp/cpcv-ui-restore.patch
          grep -RIl '0.8.10-ui2-ui2' public | xargs -r sed -i 's/0\.8\.10-ui2-ui2/0.8.10-ui2/g'
          python - <<'PY'
          from pathlib import Path

          privacy = Path('public/privacy/index.html')
          value = privacy.read_text(encoding='utf-8')
          value = value.replace(
              '<article><strong>コメント</strong><p>環境で設定された保持期限を超えたコメントは 削除処理前でも通常の一覧や投影対象から除外します。</p></article>',
              '<article><strong>コメント</strong><p>コメントの標準保持期間は30日です。設定された期限を超えたコメントは、削除処理前でも通常の一覧や投影対象から除外します。</p></article>'
          )
          value = value.replace(
              '<article><strong>出力制限</strong><p>個人別理解度履歴。個人ランキング。特定学生の滞在時間は提供しません。</p></article>',
              '<article><strong>端末内データ</strong><p>投影画面のブラウザには受信コメントを最大2,000件保存します。共用端末では授業後にログを消去してください。</p></article>'
          )
          value = value.replace(
              '<div><p>AI判定と翻訳は追加機能です。有効にした授業ではコメント本文を処理対象にします。PDF内容はAIへ送りません。AIを使わず 辞書判定だけで運用することもできます。</p></div>',
              '<div><p>AI判定と翻訳は追加機能です。有効にした授業ではコメント本文をCloudflare Workers AIへ送信します。PDF内容は送りません。AIを使わず、辞書判定だけで運用することもできます。</p></div>'
          )
          privacy.write_text(value, encoding='utf-8')

          guide = Path('public/guide/index.html')
          value = guide.read_text(encoding='utf-8')
          value = value.replace(
              '<li>AI判定と翻訳</li></ul></article>',
              '<li>AI判定と翻訳</li></ul><p>辞書や組織全体のAI上限は、授業管理上部の「アカウント設定」から変更します。</p></article>'
          )
          guide.write_text(value, encoding='utf-8')

          test = Path('scripts/test-v0810-security-ui.mjs')
          value = test.read_text(encoding='utf-8')
          value = value.replace(
              "check('student page asset versions match 0.8.10', htmlAssetVersions.length > 0 && htmlAssetVersions.every((value) => value === '0.8.10'));",
              "check('student page asset versions match the 0.8.10 UI release', htmlAssetVersions.length > 0 && htmlAssetVersions.every((value) => value === '0.8.10' || value === '0.8.10-ui2'));"
          )
          test.write_text(value, encoding='utf-8')
          PY
      - name: Confirm functional system remains intact
        shell: bash
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if(p.version!=='0.8.10') process.exit(1)"
          grep -Fq '授業中の操作' public/admin/index.html
          grep -Fq '授業設定' public/admin/index.html
          grep -Fq 'organization-settings.js' public/account/index.html
          grep -Fq '0.8.10-ui2' public/index.html
          grep -Fq '画面は<br>二つだけ。' public/index.html
          grep -Fq 'AI_QUEUE_PARALLELISM' src/ai/processor.js
          test "$(sha256sum src/ai/processor.js | cut -d' ' -f1)" = "$(git show HEAD:src/ai/processor.js | sha256sum | cut -d' ' -f1)"
          test "$(sha256sum src/comments/validation.js | cut -d' ' -f1)" = "$(git show HEAD:src/comments/validation.js | sha256sum | cut -d' ' -f1)"
          test "$(sha256sum src/security-headers.js | cut -d' ' -f1)" = "$(git show HEAD:src/security-headers.js | sha256sum | cut -d' ' -f1)"
      - name: Finalize tree and source manifest
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .ui-restore .github/workflows/apply-ui-restore.yml
          rm -f SOURCE_SHA256SUMS.override.txt
          git add -A
          npm run manifest:source
          git add SOURCE_SHA256SUMS.txt
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git commit -m "Restore CPCV 0.8.8 visual quality"
          rm -f SOURCE_SHA256SUMS.override.txt
      - name: Verify finalized source manifest
        run: npm run verify:source-manifest
      - name: Run static project checks
        run: |
          npm run check
          npm run check:project
          npm run check:pdf-links
      - name: Verify Stage 8 boundaries
        run: node scripts/verify-stage08-boundaries.mjs
      - name: Verify precision boundaries
        run: node scripts/verify-precision-boundaries.mjs
      - name: Verify stage compatibility
        run: node scripts/test-stage-compatibility.mjs
      - name: Verify deployment tests
        run: node scripts/test-deployment-verifiers.mjs
      - name: Run aggregate Stage 8 tests
        run: node scripts/test-stage08-all.mjs
      - name: Run 0.8.10 usability tests
        run: node scripts/test-v0810-usability.mjs
      - name: Run 0.8.10 security UI tests
        run: node scripts/test-v0810-security-ui.mjs
      - name: Run Owner bootstrap regression
        run: npm run test:owner-bootstrap
      - name: Audit dependencies
        run: npm audit
      - name: Push finalized UI restoration
        shell: bash
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
