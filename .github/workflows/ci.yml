name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Full local validation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci || {
            echo "npm ci failed once; clearing the npm cache and retrying."
            npm cache clean --force
            npm ci
          }

      - name: Run static project and documentation checks
        run: |
          npm run verify:source-manifest
          npm run check
          npm run check:project
          npm run check:pdf-links
          npm run verify:final-docs

      - name: Run all implemented-stage tests
        run: npm run check:stage08

      - name: Run Owner bootstrap regression
        run: npm run test:owner-bootstrap

      - name: Validate Wrangler bundle
        run: npm run deploy:dry-run

      - name: Audit all dependencies
        run: |
          npm audit
          npm audit --omit=dev
