name: Collect CPCV npm audit report

on:
  push:
    branches:
      - agent/cpcv-v0.8.10-final
    paths:
      - ".cpcv-audit-trigger"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --global npm@11.18.0
      - run: npm ci

      - name: Collect audit reports
        shell: bash
        run: |
          set -euo pipefail
          npm audit --json > npm-audit-all.json || true
          npm audit --omit=dev --json > npm-audit-production.json || true
          git rm .github/workflows/collect-npm-audit.yml .cpcv-audit-trigger
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git add npm-audit-all.json npm-audit-production.json
          git commit -m "chore: capture npm audit reports"
          git push origin HEAD:agent/cpcv-v0.8.10-final
