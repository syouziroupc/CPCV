name: Deploy CPCV 0.8.10 staging from PR

on:
  pull_request:
    branches:
      - master
    paths:
      - ".deploy/staging-v0810-ready"
      - ".github/workflows/deploy-staging-v0810.yml"
      - ".github/workflows/deploy-staging-pr-v0810.yml"

permissions:
  contents: read

concurrency:
  group: cpcv-staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy and verify CPCV 0.8.10 staging
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm install --global npm@11.18.0
          npm ci

      - name: Require Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Materialize verified staging configuration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/deploy-staging-v0810.yml').read_text(encoding='utf-8')
          start = "cat > .cpcv-staging.wrangler.toml <<'TOML'\n"
          block = text.split(start, 1)[1].split('\n          TOML', 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('.cpcv-staging.wrangler.toml').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          grep -F 'name = "class-pdf-comment-viewer-v01-staging"' .cpcv-staging.wrangler.toml
          grep -F 'database_id = "7b30a11d-5b3c-49f5-bc54-9a1326818089"' .cpcv-staging.wrangler.toml

      - name: Validate source and deployment bundle
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node -e "const p=require('./package.json'); if(p.version!=='0.8.10') process.exit(1)"
          npm run check:v0810
          node --no-warnings scripts/test-ai-v2.mjs
          node --no-warnings scripts/test-realtime-v2.mjs
          node scripts/verify-deployment-config.mjs .cpcv-staging.wrangler.toml
          npx wrangler deploy --dry-run --config .cpcv-staging.wrangler.toml
          npm audit

      - name: Deploy Worker and static assets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config .cpcv-staging.wrangler.toml --keep-vars

      - name: Verify deployed pages
        shell: bash
        run: |
          set -euo pipefail
          origin="https://class-pdf-comment-viewer-v01-staging.syouziroupc.workers.dev"
          query="deploy=0.8.10-${GITHUB_RUN_ID}"
          fetch() { curl --fail-with-body -sS --retry 12 --retry-delay 3 --retry-all-errors "$1"; }
          fetch "${origin}/?${query}" > /tmp/home.html
          fetch "${origin}/about?${query}" > /tmp/about.html
          fetch "${origin}/guide?${query}" > /tmp/guide.html
          fetch "${origin}/privacy?${query}" > /tmp/privacy.html
          fetch "${origin}/admin?${query}" > /tmp/admin.html
          grep -F 'app.css?v=0.8.10' /tmp/home.html
          grep -F '授業中の操作を一つにまとめる' /tmp/home.html
          grep -F '<title>授業管理 | CPCV</title>' /tmp/admin.html
          grep -F '授業中の操作' /tmp/admin.html
          grep -F '授業設定' /tmp/admin.html
          grep -F 'CPCVとは' /tmp/about.html
          grep -F '使い方' /tmp/guide.html
          grep -F 'プライバシー' /tmp/privacy.html

      - name: Record deployment evidence
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p deployment-records
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/class-pdf-comment-viewer-v01-staging"
          curl --fail-with-body -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${api}/deployments" > deployment-records/deployments-after.json
          printf '%s\n' \
            'version=0.8.10' \
            'worker=class-pdf-comment-viewer-v01-staging' \
            'url=https://class-pdf-comment-viewer-v01-staging.syouziroupc.workers.dev' \
            "deployed_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            'd1_migrations_applied=false' > deployment-records/deployment-record.txt

      - uses: actions/upload-artifact@v4
        with:
          name: cpcv-v0810-staging-deployment
          path: deployment-records
          if-no-files-found: error
          retention-days: 30
