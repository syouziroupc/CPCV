name: Finalize CPCV 0.8.10 manifest transfer

on:
  push:
    branches:
      - agent/cpcv-v0.8.10-final
    paths:
      - ".manifest-transfer/trigger"

permissions:
  contents: write

concurrency:
  group: finalize-cpcv-v0810-manifest-transfer
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild transferred manifest
        shell: bash
        run: |
          set -euo pipefail
          cat .manifest-transfer/chunk-*.txt > SOURCE_SHA256SUMS.txt
          test "$(sha256sum SOURCE_SHA256SUMS.txt | cut -d' ' -f1)" = "b586c6ddf2a0d4c99255f77ab86ffc19089f11454d62902b5373184dac6fb058"
          rm -rf .manifest-transfer
          rm .github/workflows/finalize-manifest-transfer.yml

      - name: Install dependencies
        run: npm ci

      - name: Validate final source
        run: |
          npm run verify:source-manifest
          npm run verify:final-docs
          npm run check:v0810
          node --no-warnings scripts/test-ai-v2.mjs
          node --no-warnings scripts/test-realtime-v2.mjs

      - name: Commit final tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "fix: finalize 0.8.10 source manifest"
          git push origin HEAD:agent/cpcv-v0.8.10-final
