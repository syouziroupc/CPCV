name: Finalize CPCV 0.8.10 source manifest

on:
  push:
    branches:
      - agent/cpcv-v0.8.10-final
    paths:
      - ".cpcv-trigger/finalize"
      - ".github/workflows/finalize-v0810-manifest.yml"

permissions:
  contents: write

concurrency:
  group: finalize-v0810-manifest
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify expected source state
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor dbcebb1c3c0f7137e593e68eabf797fa90d488a9 HEAD
          node -e "const p=require('./package.json'); if(p.version!=='0.8.10') process.exit(1)"
          grep -q 'delivery-only' docs/v0.8.10-debug-fixes.md
          grep -q 'モバイル' docs/v0.8.10-debug-fixes.md

      - name: Remove temporary trigger files from index
        run: git rm .github/workflows/finalize-v0810-manifest.yml .cpcv-trigger/finalize

      - name: Install dependencies
        run: npm ci

      - name: Regenerate and validate manifest
        run: |
          npm run manifest:source
          npm run verify:source-manifest
          npm run verify:final-docs
          npm run check:v0810
          node --no-warnings scripts/test-ai-v2.mjs
          node --no-warnings scripts/test-realtime-v2.mjs

      - name: Commit and push final tree
        run: |
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "fix: regenerate 0.8.10 source manifest"
          git push origin HEAD:agent/cpcv-v0.8.10-final
