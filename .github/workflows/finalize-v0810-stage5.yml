name: Finalize CPCV 0.8.10 Stage 5 contract

on:
  push:
    branches:
      - agent/cpcv-v0.8.10-final
    paths:
      - ".cpcv-stage5-finalize"

permissions:
  contents: write

concurrency:
  group: finalize-cpcv-v0810-stage5
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci

      - name: Generate final manifest commit
        shell: bash
        run: |
          set -euo pipefail
          node scripts/verify-stage05-boundaries.mjs
          git rm .github/workflows/finalize-v0810-stage5.yml .cpcv-stage5-finalize
          npm run manifest:source
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "fix: refresh manifest for cookie contract"

      - name: Validate final commit
        run: |
          npm run verify:source-manifest
          npm run verify:final-docs
          npm run check:stage08

      - name: Push final commit
        run: git push origin HEAD:agent/cpcv-v0.8.10-final
