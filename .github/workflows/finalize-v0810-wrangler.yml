name: Finalize CPCV 0.8.10 Wrangler security update

on:
  push:
    branches:
      - agent/cpcv-v0.8.10-final
    paths:
      - ".cpcv-wrangler-finalize"

permissions:
  contents: write

concurrency:
  group: finalize-cpcv-v0810-wrangler
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --global npm@11.18.0
      - run: npm ci

      - name: Update Wrangler and create final commit
        shell: bash
        run: |
          set -euo pipefail
          npm install --save-dev --save-exact wrangler@4.114.0
          git rm .github/workflows/finalize-v0810-wrangler.yml .cpcv-wrangler-finalize npm-audit-all.json npm-audit-production.json
          git add package.json package-lock.json
          npm run manifest:source
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git add SOURCE_SHA256SUMS.txt
          git commit -m "fix: update Wrangler to 4.114.0"

      - name: Validate final commit
        run: |
          npm run verify:source-manifest
          npm run verify:final-docs
          npm run check:stage08
          npm run test:owner-bootstrap
          npm run deploy:dry-run
          npm audit
          npm audit --omit=dev

      - name: Push final commit
        run: git push origin HEAD:agent/cpcv-v0.8.10-final
