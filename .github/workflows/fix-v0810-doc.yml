name: Fix CPCV 0.8.10 release documentation

on:
  push:
    branches:
      - agent/cpcv-v0.8.10
    paths:
      - ".github/workflows/fix-v0810-doc.yml"

permissions:
  contents: write

concurrency:
  group: fix-v0810-doc
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify expected source commit
        run: test "$(git rev-parse HEAD^)" = "f67969e19d492b76ebd3eb50b03f4171da8d143a"

      - name: Correct documentation and regenerate manifest
        shell: python
        run: |
          from pathlib import Path
          path = Path("docs/v0.8.10-debug-fixes.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "- 翻訳保存後の通知失敗は通知だけ再送",
              "- 翻訳保存後の通知失敗はAIを再実行せず。delivery-only経路で通知だけ再送",
          )
          text = text.replace(
              "- 820px以下は1カラムとカード表示",
              "- 820px以下は1カラムとカード表示へ変更し。モバイルとtabletの横切れを防止",
          )
          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/fix-v0810-doc.yml").unlink()

      - name: Install dependencies
        run: npm ci

      - name: Regenerate and validate source manifest
        run: |
          npm run manifest:source
          npm run verify:final-docs
          npm run check:v0810
          node --no-warnings scripts/test-ai-v2.mjs
          node --no-warnings scripts/test-realtime-v2.mjs

      - name: Commit and push correction
        run: |
          git config user.name "ChatGPT Codex Connector"
          git config user.email "noreply@openai.com"
          git add -A
          git commit -m "fix: align 0.8.10 release documentation"
          git push origin HEAD:agent/cpcv-v0.8.10
