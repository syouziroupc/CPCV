name: Inspect CPCV staging before 0.8.10 deploy

on:
  push:
    branches:
      - agent/deploy-v0.8.10-staging
    paths:
      - ".github/workflows/inspect-staging-v0810.yml"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/inspect-staging-v0810.yml"

permissions:
  contents: read

jobs:
  inspect:
    name: Read current Cloudflare staging configuration
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Require Cloudflare credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Fetch current staging metadata without secret values
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SCRIPT_NAME: class-pdf-comment-viewer-v01-staging
        run: |
          set -euo pipefail
          mkdir -p staging-inspection
          api="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}"
          auth=( -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" )

          curl --fail-with-body -sS "${auth[@]}" "${api}/settings" > staging-inspection/settings.raw.json
          curl --fail-with-body -sS "${auth[@]}" "${api}/deployments" > staging-inspection/deployments.json
          curl --fail-with-body -sS "${auth[@]}" "${api}/schedules" > staging-inspection/schedules.json
          curl --fail-with-body -sS "${auth[@]}" "${api}/secrets" > staging-inspection/secrets.json
          curl --fail-with-body -sS "${auth[@]}" "${api}/subdomain" > staging-inspection/subdomain.json

          jq 'walk(if type == "object" and has("text") and ((.type // "") | startswith("secret")) then .text = "<redacted>" else . end)' \
            staging-inspection/settings.raw.json > staging-inspection/settings.json
          rm staging-inspection/settings.raw.json

          jq -e '.success == true' staging-inspection/settings.json >/dev/null
          jq -e '.success == true' staging-inspection/deployments.json >/dev/null
          jq -e '.success == true' staging-inspection/schedules.json >/dev/null
          jq -e '.success == true' staging-inspection/secrets.json >/dev/null

          {
            echo "## Current staging bindings"
            echo
            jq -r '.result.bindings[]? | "- `\(.name // "(unnamed)")`: `\(.type)`"' staging-inspection/settings.json
            echo
            echo "Secrets are listed by name and type only; values are not retrieved."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload inspection record
        uses: actions/upload-artifact@v4
        with:
          name: cpcv-staging-inspection
          path: staging-inspection
          if-no-files-found: error
          retention-days: 1
