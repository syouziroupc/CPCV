<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>組織への招待</title>
  <link rel="stylesheet" href="/assets/app.css?v=0.6.5">
</head>
<body class="page">
  <main class="card narrow">
    <p class="eyebrow">CPCV</p>
    <h1>組織への招待</h1>
    <div id="invitationInfo" class="info-box hidden"></div>
    <p id="status" class="status" aria-live="polite">招待を確認しています。</p>
    <section id="existingSection" class="section hidden">
      <h2>既存アカウントで承認</h2>
      <p class="muted">招待先と同じメールアドレスでログインしてください。</p>
      <label class="label" for="loginEmail">メールアドレス</label>
      <input id="loginEmail" class="input" type="email" autocomplete="email" maxlength="254">
      <label class="label" for="loginPassword">パスワード</label>
      <input id="loginPassword" class="input" type="password" autocomplete="current-password" maxlength="128">
      <div id="organizationGroup" class="hidden">
        <label class="label" for="organization">ログイン先組織</label>
        <select id="organization" class="input"></select>
      </div>
      <button id="loginButton" class="button primary auth-submit" type="button">ログインして承認</button>
    </section>
    <section id="loggedInSection" class="section hidden">
      <p id="loggedInIdentity" class="muted break"></p>
      <button id="acceptExistingButton" class="button primary" type="button">このアカウントで承認</button>
    </section>
    <section id="newSection" class="section hidden">
      <h2>新しいアカウントを作成</h2>
      <label class="label" for="displayName">表示名</label>
      <input id="displayName" class="input" autocomplete="name" maxlength="80">
      <label class="label" for="newPassword">パスワード</label>
      <input id="newPassword" class="input" type="password" autocomplete="new-password" minlength="8" maxlength="128">
      <p class="muted">8文字以上。128文字以下。</p>
      <button id="createButton" class="button primary auth-submit" type="button">アカウントを作成して承認</button>
    </section>
    <section id="completeSection" class="section hidden">
      <a class="button primary" href="/admin">授業管理へ進む</a>
    </section>
  </main>
  <script type="module" src="/assets/accept-invitation.js?v=0.6.5"></script>
</body>
</html>
