<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウント設定</title>
  <link rel="stylesheet" href="/assets/app.css?v=0.6.5">
</head>
<body class="page">
  <main class="card narrow">
    <div class="row between wrap">
      <div>
        <p class="eyebrow">CPCV</p>
        <h1>アカウント設定</h1>
      </div>
      <a class="button" href="/admin">授業管理へ</a>
    </div>
    <section id="loadingSection" class="section"><p class="status">読み込んでいます。</p></section>
    <section id="accountSection" class="hidden">
      <div class="info-box">
        <p><strong id="displayName"></strong></p>
        <p id="emailState" class="break"></p>
        <p id="organizationState" class="muted break pre-line"></p>
      </div>
      <section class="section">
        <h2 id="emailHeading">メールアドレスを変更</h2>
        <p id="emailExplanation" class="muted">新しいメールアドレスへ確認リンクを送ります。確認後は全端末からログアウトします。</p>
        <form id="emailForm">
          <label class="label" for="newEmail">新しいメールアドレス</label>
          <input id="newEmail" class="input" type="email" autocomplete="email" maxlength="254" required>
          <label class="label" for="currentPassword">現在のパスワード</label>
          <input id="currentPassword" class="input" type="password" autocomplete="current-password" maxlength="128" required>
          <button id="emailButton" class="button primary auth-submit" type="submit">確認メールを送る</button>
        </form>
        <p id="pendingEmail" class="muted break"></p>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
      <section class="section">
        <button id="logoutButton" class="button danger" type="button">ログアウト</button>
      </section>
      <section class="section danger-zone">
        <h2>&#12450;&#12459;&#12454;&#12531;&#12488;&#21066;&#38500;</h2>
        <p class="muted">&#21066;&#38500;&#24460;&#12399;&#12525;&#12464;&#12452;&#12531;&#12391;&#12365;&#12414;&#12379;&#12435;&#12290;&#25152;&#26377;&#32773;&#12364;&#33258;&#20998;&#12384;&#12369;&#12398;&#20849;&#26377;&#32068;&#32340;&#12364;&#12354;&#12427;&#22580;&#21512;&#12399;&#12289;&#20808;&#12395;&#25152;&#26377;&#27177;&#12434;&#31227;&#31649;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;</p>
        <form id="deleteAccountForm">
          <label class="label" for="deletePassword">&#29694;&#22312;&#12398;&#12497;&#12473;&#12527;&#12540;&#12489;</label>
          <input id="deletePassword" class="input" type="password" autocomplete="current-password" maxlength="128" required>
          <label class="label" for="deleteConfirmation">&#30906;&#35469;&#12398;&#12383;&#12417; DELETE &#12392;&#20837;&#21147;</label>
          <input id="deleteConfirmation" class="input" autocomplete="off" pattern="DELETE" required>
          <button id="deleteAccountButton" class="button danger" type="submit">&#12450;&#12459;&#12454;&#12531;&#12488;&#12434;&#21066;&#38500;</button>
        </form>
        <p id="deleteStatus" class="status" aria-live="polite"></p>
      </section>
    </section>
    <section id="loginRequired" class="hidden section">
      <p>ログインが必要です。</p>
      <a class="button primary" href="/admin">ログイン画面へ</a>
    </section>
  </main>
  <script type="module" src="/assets/account.js?v=0.6.5"></script>
</body>
</html>
