<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>授業コメント表示</title>
  <link rel="stylesheet" href="/assets/app.css?v=0.9.2">
</head>
<body class="page">
  <main class="card narrow">
    <h1>授業コメント表示</h1>
    <p>先生は授業管理からログインしてください。</p>
    <div class="home-actions">
      <a class="button primary" href="/admin">先生用 授業管理</a>
    </div>
    <section class="home-join">
      <h2>学生はこちら</h2>
      <label class="label" for="homePublicCode">授業の合言葉</label>
      <div class="row">
        <input id="homePublicCode" class="input code-input" maxlength="6" autocomplete="off" autocapitalize="characters" placeholder="例: ABC123">
        <button id="homeJoinButton" class="button primary" type="button">授業コメントへ</button>
      </div>
      <p id="homeJoinStatus" class="status"></p>
    </section>
    <p class="muted">先生から案内された6文字の合言葉、リンク、またはQRコードで参加できます。</p>
  </main>
  <script src="/assets/home.js?v=0.8.0" type="module"></script>
</body>
</html>
