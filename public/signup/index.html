<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウントを登録</title>
  <link rel="stylesheet" href="/assets/app.css?v=0.6.5a">
  <link rel="preconnect" href="https://challenges.cloudflare.com">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
</head>
<body class="page">
  <main class="card narrow">
    <p class="eyebrow">CPCV</p>
    <h1>アカウントを登録</h1>
    <p class="muted">確認メールを受け取れるメールアドレスを使用してください。</p>
    <form id="signupForm">
      <label class="label" for="email">メールアドレス</label>
      <input id="email" class="input" type="email" autocomplete="email" maxlength="254" required>
      <label class="label" for="displayName">表示名</label>
      <input id="displayName" class="input" autocomplete="name" maxlength="80" required>
      <label class="label" for="password">パスワード</label>
      <input id="password" class="input" type="password" autocomplete="new-password" minlength="8" maxlength="128" required aria-describedby="passwordHint">
      <p id="passwordHint" class="muted" aria-live="polite">8文字以上。128文字以下。</p>
      <div id="turnstile" class="auth-challenge"></div>
      <button id="submitButton" class="button primary auth-submit" type="submit">確認メールを送る</button>
    </form>
    <p id="status" class="status" aria-live="polite"></p>
    <p><a href="/admin">ログインへ戻る</a></p>
  </main>
  <script type="module" src="/assets/signup.js?v=0.6.5c"></script>
</body>
</html>
