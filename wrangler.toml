#:schema node_modules/wrangler/config-schema.json
name = "class-pdf-comment-viewer-v01"
main = "src/index.js"
compatibility_date = "2026-06-17"

assets = { directory = "./public", binding = "ASSETS", run_worker_first = true, html_handling = "none" }

[[d1_databases]]
binding = "DB"
database_name = "class_comment_db"
database_id = "f11457fa-27af-468d-94cc-6cdf1ae814e4"

# DB_V2 is the application source of truth. Its production database_id remains
# intentionally absent because no verified Cloudflare UUID is present in this
# handoff. Do not invent one. Deployment is blocked until the real UUID is set.
[[d1_databases]]
binding = "DB_V2"
database_name = "class_comment_db_v2"
migrations_dir = "migrations-v2"


[[send_email]]
name = "EMAIL"

[ai]
binding = "AI"

[[queues.producers]]
binding = "AI_JOBS_QUEUE"
queue = "cpcv-ai-jobs"

[[queues.consumers]]
queue = "cpcv-ai-jobs"
max_batch_size = 5
max_batch_timeout = 1
max_retries = 3
max_concurrency = 3

[[durable_objects.bindings]]
name = "COMMENT_ROOM"
class_name = "CommentRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CommentRoom"]

[vars]
APP_ENV = "production"
AUTH_V2_ENABLED = "1"
EMAIL_AUTH_REQUIRED = "0"
AI_MODERATION_MODEL = "@cf/zai-org/glm-4.7-flash"
AI_MODERATION_FALLBACK_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
AI_TRANSLATION_MODEL = "@cf/zai-org/glm-4.7-flash"
AI_TRANSLATION_FALLBACK_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
AI_TIMEOUT_MS = "12000"
AI_QUEUE_PARALLELISM = "2"
AUTH_ORIGIN = "https://class-pdf-comment-viewer-v01.syouziroupc.workers.dev"
# Public origin used in admin to show the student URL.
PUBLIC_ORIGIN = "https://class-pdf-comment-viewer-v01.syouziroupc.workers.dev"

# Daily retention and expired security-token cleanup. Cron uses UTC.
[triggers]
crons = [ "*/5 * * * *", "17 3 * * *" ]

# Production deployment requires four distinct Rate Limiting bindings.
# It also requires final email and Turnstile values plus a restricted EMAIL sender.
# Do not invent external IDs or secrets. See docs/final-stage08/17_CLOUDFLARE_PENDING_VALUES.md.
